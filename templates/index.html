<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경매 물건 정보 수집기 | Smart Auction Scraper</title>
    <!-- 구글 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 10px;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            background-color: #fcfcfc;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        /* 로딩 오버레이 */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-weight: 600;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-area">
                <span class="logo-icon">🏢</span>
                <h1>경매 물건 수집기</h1>
                <p class="subtitle">수집할 목록의 URL을 입력하시면<br>엑셀 파일로 자동 변환하여 정리해 드립니다.</p>
            </div>
            
            <form action="/scrape" method="post" onsubmit="showLoading()">
                <div class="input-group">
                    <input type="text" id="url" name="url" placeholder="https://example-auction.com/list..." required autocomplete="off">
                </div>
                <button type="submit" id="submit-btn">
                    데이터 수집 시작
                </button>
            </form>

            <div class="footer">
                © 2026 Smart Auction Scraper. All rights reserved.
            </div>
        </div>
    </div>

    <!-- 로딩 화면 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">경매 데이터를 분석 중입니다...</div>
        <p style="margin-top: 10px; color: #64748b;">잠시만 기다려 주세요 (약 5~10초 소요)</p>
    </div>

    <script>
        function showLoading() {
            const urlInput = document.getElementById('url').value;
            if(urlInput.trim() !== "") {
                document.getElementById('loading-overlay').style.display = 'flex';
                document.getElementById('submit-btn').disabled = true;
            }
        }
    </script>
</body>
</html>
